modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${neoforge_mod_version}"
displayName="${mod_name}"
logoFile="icon.png"
authors="${mod_author}"
description='''${mod_description}'''
